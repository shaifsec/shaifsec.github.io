<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Recon by ShaifSec</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <h1 class="section-title">⚠ Web Recon by ShaifSec ⚠</h1>
  <p class="section-subtitle">Quick Recon links for investigation and OSINT.</p>

  <div class="hero-cta">
    <button class="btn btn-primary" onclick="openSite('https://urlscan.io')">URLScan</button>
    <button class="btn btn-primary" onclick="openSite('https://nslookup.io')">NSLookup</button>
    <button class="btn btn-primary" onclick="openSite('https://subdomainfinder.c99.nl/scans/2026-06-21/target.com')">C99 Subdomain Finder</button>
    <button class="btn btn-primary" onclick="openSite('https://searchdns.netcraft.com/')">Netcraft DNS Search</button>
    <button class="btn btn-primary" onclick="openSite('https://web.archive.org/')">Wayback Machine</button>
    <button class="btn btn-primary" onclick="openSite('https://www.certkit.io/tools/ct-logs/')">CT Logs</button>
    <button class="btn btn-primary" onclick="openSite('https://builtwith.com/')">BuiltWith</button>
    <button class="btn btn-primary" onclick="openSite('https://whois.domaintools.com/')">DomainTools WHOIS</button>
  </div>

  <div class="footer section-subtitle">Web Recon Dashboard | ShaifSec</div>
</div>

<script>
function openSite(url) {
  window.open(url, "_blank");
}
</script>
</body>
</html>
